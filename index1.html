<!DOCTYPE html>
<html>
<head>
<title>Login - PURE MIND</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align:center;
}

.login-box{
    background:white;
    width:300px;
    margin:auto;
    margin-top:100px;
    padding:20px;
    border-radius:10px;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px;
    width:100%;
    background:#4facfe;
    color:white;
    border:none;
}
</style>

</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form onsubmit="return loginUser()">
<input type="text" id="user" placeholder="Username" required>
<input type="password" id="pass" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

<script>
function loginUser(){
    var u = document.getElementById("user").value;
    var p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234"){
        window.location.href = "home.html"; // after login
    } else {
        alert("Invalid login");
    }
    return false;
}
</script>

</body>
</html>
